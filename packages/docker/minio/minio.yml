services:
  minio:
    profiles: [minio, backend]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propel-minio
    restart: unless-stopped
    user: minio
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
      - CHOWN
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-propel-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BROWSER: "on"
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    volumes:
      - minio_data:/data
    networks:
      - propel-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  minio_data:
    driver: local
    name: propel_minio_data

networks:
  propel-backend:
    driver: bridge
    name: propel-backend
