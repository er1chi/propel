services:
  server:
    profiles: [server, backend]
    build:
      context: ../../../apps/server
      dockerfile: ../../docker/server/Dockerfile
      target: production
    container_name: propel-server
    restart: unless-stopped
    user: propel
    read_only: true
    tmpfs:
      - /tmp:size=10M,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-propel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-propel}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-propel-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "3000:3000"
    networks:
      - propel-backend
      - propel-frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  propel-backend:
    driver: bridge
    name: propel-backend
  propel-frontend:
    driver: bridge
    name: propel-frontend
